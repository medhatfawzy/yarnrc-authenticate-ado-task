name: Build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node-version: [16, 20, 24]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: YarnrcAuthenticate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable
      
      - name: Install dependencies
        run: yarn install --immutable
        env:
          NODE_OPTIONS: ${{ matrix.node-version == 16 && '--experimental-fetch' || '' }}
        
      - name: Run tests
        run: yarn test
        env:
          NODE_OPTIONS: ${{ matrix.node-version == 16 && '--experimental-fetch' || '' }}
      
      - name: Lint code
        run: yarn lint
        env:
          NODE_OPTIONS: ${{ matrix.node-version == 16 && '--experimental-fetch' || '' }}
      
      - name: Build extension
        run: yarn build
        env:
          NODE_OPTIONS: ${{ matrix.node-version == 16 && '--experimental-fetch' || '' }}
